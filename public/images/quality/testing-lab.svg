<svg width="600" height="400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="lab" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#e8eaed;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#c0c5ce;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="600" height="400" fill="url(#lab)"/>

  <!-- Lab bench -->
  <rect x="50" y="250" width="500" height="100" fill="#ffffff" stroke="#1a1f2e" stroke-width="3"/>

  <!-- Testing equipment -->
  <rect x="100" y="180" width="80" height="70" fill="#c0c5ce" stroke="#1a1f2e" stroke-width="2"/>
  <rect x="110" y="190" width="60" height="20" fill="#ff6b35" opacity="0.8"/>
  <circle cx="140" cy="170" r="8" fill="#00ff00" opacity="0.8"/>

  <!-- Microscope -->
  <rect x="250" y="200" width="30" height="50" fill="#1a1f2e"/>
  <circle cx="265" cy="190" r="15" fill="#c0c5ce" stroke="#1a1f2e" stroke-width="2"/>

  <!-- Computer -->
  <rect x="350" y="200" width="60" height="40" fill="#1a1f2e"/>
  <rect x="355" y="205" width="50" height="30" fill="#00ff00" opacity="0.3"/>

  <!-- Test samples -->
  <rect x="450" y="230" width="15" height="20" fill="#c0c5ce"/>
  <rect x="470" y="230" width="15" height="20" fill="#e8eaed"/>
  <rect x="490" y="230" width="15" height="20" fill="#c0c5ce"/>

  <!-- Charts on wall -->
  <rect x="80" y="80" width="100" height="80" fill="#ffffff" stroke="#1a1f2e" stroke-width="2"/>
  <line x1="90" y1="150" x2="170" y2="100" stroke="#ff6b35" stroke-width="3"/>

  <rect x="250" y="60" width="120" height="100" fill="#ffffff" stroke="#1a1f2e" stroke-width="2"/>
  <rect x="260" y="70" width="100" height="8" fill="#1a1f2e" opacity="0.3"/>
  <rect x="260" y="85" width="80" height="6" fill="#1a1f2e" opacity="0.3"/>
  <rect x="260" y="100" width="90" height="6" fill="#1a1f2e" opacity="0.3"/>

  <text x="300" y="360" font-family="Arial, sans-serif" font-size="20" font-weight="bold" text-anchor="middle" fill="#1a1f2e">QUALITY TESTING LABORATORY</text>
</svg>