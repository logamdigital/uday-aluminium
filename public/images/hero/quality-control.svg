<svg width="1200" height="700" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1f2e;stop-opacity:1" />
      <stop offset="40%" style="stop-color:#2c3e50;stop-opacity:1" />
      <stop offset="80%" style="stop-color:#c0c5ce;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#e8eaed;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="1200" height="700" fill="url(#grad3)"/>

  <!-- Quality control equipment -->
  <rect x="200" y="250" width="300" height="200" rx="20" fill="#ffffff" opacity="0.9" stroke="#1a1f2e" stroke-width="3"/>
  <rect x="220" y="270" width="260" height="100" rx="10" fill="#c0c5ce" opacity="0.7"/>
  <circle cx="350" cy="400" r="30" fill="#ff6b35" opacity="0.8"/>

  <!-- Certificate/checklist -->
  <rect x="600" y="200" width="200" height="250" rx="10" fill="#ffffff" opacity="0.9" stroke="#1a1f2e" stroke-width="2"/>
  <rect x="620" y="220" width="160" height="8" rx="4" fill="#ff6b35" opacity="0.6"/>
  <rect x="620" y="240" width="140" height="6" rx="3" fill="#1a1f2e" opacity="0.4"/>
  <rect x="620" y="255" width="120" height="6" rx="3" fill="#1a1f2e" opacity="0.4"/>
  <rect x="620" y="270" width="160" height="6" rx="3" fill="#1a1f2e" opacity="0.4"/>

  <!-- Checkmarks -->
  <circle cx="630" cy="300" r="8" fill="#00ff00" opacity="0.8"/>
  <circle cx="630" cy="320" r="8" fill="#00ff00" opacity="0.8"/>
  <circle cx="630" cy="340" r="8" fill="#00ff00" opacity="0.8"/>
  <circle cx="630" cy="360" r="8" fill="#00ff00" opacity="0.8"/>

  <!-- Lab equipment -->
  <ellipse cx="900" cy="350" rx="80" ry="120" fill="#c0c5ce" opacity="0.6"/>
  <rect x="870" y="300" width="60" height="30" rx="5" fill="#ff6b35" opacity="0.7"/>

  <text x="600" y="550" font-family="Arial, sans-serif" font-size="42" font-weight="bold" text-anchor="middle" fill="#ffffff" opacity="0.9">QUALITY CONTROL</text>
  <text x="600" y="590" font-family="Arial, sans-serif" font-size="22" text-anchor="middle" fill="#ffffff" opacity="0.7">ISO Certified Testing</text>
</svg>